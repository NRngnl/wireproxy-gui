name: Release

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'

permissions:
  contents: write

env:
  APP_ID: com.example.wireproxy-gui
  FYNE_CROSS_VERSION: v1.6.2

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Linux GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev pkg-config xorg-dev

      - name: Run tests
        run: go test -count=1 ./...

  prepare-release:
    name: Prepare draft release
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --draft \
              --title "Wireproxy GUI ${version}" \
              --verify-tag
          else
            gh release create "$TAG_NAME" \
              --verify-tag \
              --draft \
              --title "Wireproxy GUI ${version}" \
              --generate-notes
          fi

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
            artifact_arch: amd64
            fyne_name: wireproxy-gui
          - target: linux-aarch64
            goos: linux
            goarch: arm64
            artifact_arch: aarch64
            fyne_name: wireproxy-gui
          - target: windows-amd64
            goos: windows
            goarch: amd64
            artifact_arch: amd64
            fyne_name: wireproxy-gui
          - target: windows-aarch64
            goos: windows
            goarch: arm64
            artifact_arch: aarch64
            fyne_name: wireproxy-gui

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          go install "github.com/fyne-io/fyne-cross@${FYNE_CROSS_VERSION}"
          mod_dir="$(go env GOMODCACHE)/github.com/fyne-io/fyne-cross@${FYNE_CROSS_VERSION}"
          patched_dir="${RUNNER_TEMP}/fyne-cross-patched"
          cp -R "$mod_dir" "$patched_dir"
          chmod -R u+w "$patched_dir"
          perl -0pi -e 's/appBuildOpt := "-app-build"\n\tappVersionOpt := "-app-version"/appBuildOpt := "-appBuild"\n\tappVersionOpt := "-appVersion"/' "$patched_dir/internal/command/command.go"
          (cd "$patched_dir" && go install .)
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build release artifact
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          TARGET_OS: ${{ matrix.goos }}
          TARGET_ARCH: ${{ matrix.goarch }}
          ARTIFACT_ARCH: ${{ matrix.artifact_arch }}
          FYNE_NAME: ${{ matrix.fyne_name }}
          GOTOOLCHAIN: auto
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "release version must look like 0.1.0; got '${version}'" >&2
            exit 1
          fi

          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          commit="${GITHUB_SHA::12}"
          cat > internal/buildinfo/release_generated.go <<GO
          package buildinfo

          func init() {
            Version = "${version}"
            Commit = "${commit}"
            Date = "${build_date}"
          }
          GO
          trap 'rm -f internal/buildinfo/release_generated.go' EXIT

          rm -rf dist/release/artifacts fyne-cross
          fyne-cross "$TARGET_OS" \
            -arch "$TARGET_ARCH" \
            -app-id "$APP_ID" \
            -app-version "$version" \
            -app-build "$GITHUB_RUN_NUMBER" \
            -name "$FYNE_NAME" \
            -pull \
            -env GOTOOLCHAIN=auto \
            ./cmd/wireproxy-gui

          target_dir="fyne-cross/dist/${TARGET_OS}-${TARGET_ARCH}"
          artifact_dir="dist/release/artifacts"
          artifact_base="wireproxy-gui_${version}_${TARGET_OS}_${ARTIFACT_ARCH}"
          mkdir -p "$artifact_dir"

          case "$TARGET_OS" in
            linux)
              source_file="$(find "$target_dir" -maxdepth 1 -type f -name '*.tar.xz' -print -quit)"
              artifact="${artifact_dir}/${artifact_base}.tar.xz"
              cp "$source_file" "$artifact"
              ;;
            windows)
              source_file="$(find "$target_dir" -maxdepth 1 -type f -name '*.zip' -print -quit)"
              artifact="${artifact_dir}/${artifact_base}.zip"
              cp "$source_file" "$artifact"
              ;;
            *)
              echo "unsupported target OS: $TARGET_OS" >&2
              exit 1
              ;;
          esac

          if [[ ! -f "$artifact" ]]; then
            echo "artifact was not created: $artifact" >&2
            find fyne-cross -maxdepth 4 -print >&2
            exit 1
          fi
          sha256sum "$artifact" > "${artifact}.sha256"
          ls -lh "$artifact" "${artifact}.sha256"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: gh release upload "$TAG_NAME" dist/release/artifacts/* --clobber

  release:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: gh release edit "$TAG_NAME" --draft=false --latest
